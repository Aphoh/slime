          \ --format=csv,noheader,nounits || true\n    } >> \"${MEM_LOG}\" 2>&1\n\
          \    sleep \"${SWEPRO_TRAINER_MEM_LOG_INTERVAL:-30}\"\n  done\n) &\necho\
          \ \"trainer worker memory monitor writing to ${MEM_LOG}\"\nPOD_IP=\"$(hostname\
          \ -I | awk '{print $1}')\"\nfor i in $(seq 1 120); do\n  if (echo > /dev/tcp/warnold-swepro-trainer/6379)\
          \ >/dev/null 2>&1; then\n    break\n  fi\n  sleep 5\ndone\nray start --address=warnold-swepro-trainer:6379\
          \ --node-ip-address=\"${POD_IP}\" --num-gpus=4 --disable-usage-stats --block\n"
        resources:
          claims:
          - name: compute-domain-channel
          requests:
            cpu: '48'
            memory: 768Gi
            ephemeral-storage: 800Gi
            nvidia.com/gpu: '4'
