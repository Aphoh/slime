apiVersion: resource.nvidia.com/v1beta1
kind: ComputeDomain
metadata:
  name: warnold-swepro-compute-domain
  namespace: warnold-dynamo
  labels:
    app: warnold-swepro-trainer
    owner: warnold
spec:
  channel:
    resourceClaimTemplate:
      name: warnold-swepro-compute-domain-channel
  numNodes: 7
---
apiVersion: v1
kind: Pod
metadata:
  name: warnold-swepro-frontend
  namespace: warnold-dynamo
  labels:
    app: warnold-swepro-frontend
    owner: warnold
spec:
  restartPolicy: Never
  nodeSelector:
    cloud.google.com/gke-nodepool: customer-gpu-o7v
    nvidia.com/gpu.product: NVIDIA-GB200
    warnold-swepro-reservation: smoke-20260526
  tolerations:
  - key: kubernetes.io/arch
    operator: Equal
    value: arm64
    effect: NoSchedule
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  - key: warnold-swepro-reservation
    operator: Equal
    value: smoke-20260526
    effect: NoSchedule
  containers:
  - name: frontend
    image: aphoh/slime:swepro-observability-16ffc8f-20260526-043704
    command:
    - bash
    - -c
    args:
    - "set -eu\nPOD_LOG_DIR=\"/data/swebench-pro/pod-logs/$(hostname)\"\nmkdir -p\
      \ \"${POD_LOG_DIR}\"\nexec > >(tee -a \"${POD_LOG_DIR}/frontend.log\") 2>&1\n\
      rm -rf /tmp/warnold-swepro-etcd\netcd \\\n  --data-dir /tmp/warnold-swepro-etcd\
      \ \\\n  --listen-client-urls http://0.0.0.0:2379 \\\n  --advertise-client-urls\
      \ http://warnold-swepro-frontend:2379 \\\n  >\"${POD_LOG_DIR}/etcd.log\" 2>&1\
      \ &\nsleep 3\nexport DYN_DISCOVERY_BACKEND=etcd\nexport ETCD_ENDPOINTS=http://warnold-swepro-frontend:2379\n\
      export NATS_SERVER=nats://warnold-swepro-nats:4222\nexport DYN_AGENT_TRACE_SINKS=jsonl_gz\n\
      export DYN_AGENT_TRACE_OUTPUT_PATH=/data/swebench-pro/traces/dynamo-agent-trace\n\
      export DYN_AGENT_TRACE_TOOL_EVENTS_ZMQ_ENDPOINT=tcp://0.0.0.0:20390\nexport\
      \ DYN_AGENT_TRACE_TOOL_EVENTS_ZMQ_TOPIC=agent-tool-events\nmkdir -p /data/swebench-pro/traces\n\
      export PYTHONHASHSEED=0\nMODEL_PATH=\"${SWEPRO_STACK_MODEL_PATH:-/data/glm-4.7-30b-a3b}\"\
      \nKV_CACHE_BLOCK_SIZE=\"${SWEPRO_KV_CACHE_BLOCK_SIZE:-16}\"\nexec python3 -m\
      \ dynamo.frontend \\\n  --http-port 3000 \\\n  --router-mode kv \\\n  --kv-cache-block-size\
      \ \"${KV_CACHE_BLOCK_SIZE}\" \\\n  --router-kv-events \\\n  --discovery-backend\
      \ etcd \\\n  --model-path \"${MODEL_PATH}\"\n"
    env:
    - name: SWEPRO_STACK_MODEL_PATH
      value: /shared/Qwen3.5-122B-A10B
    - name: SWEPRO_KV_CACHE_BLOCK_SIZE
      value: '64'
    ports:
    - containerPort: 3000
      name: http
    - containerPort: 20390
      name: agent-trace
    - containerPort: 2379
      name: etcd
    resources:
      requests:
        cpu: '2'
        memory: 4Gi
      limits:
        cpu: '4'
        memory: 8Gi
    volumeMounts:
    - name: code-cache
      mountPath: /code
    - name: model-cache
      mountPath: /data
    - name: shared-cache
      mountPath: /shared
  volumes:
  - name: code-cache
    persistentVolumeClaim:
      claimName: code-cache
  - name: model-cache
    persistentVolumeClaim:
      claimName: model-cache
  - name: shared-cache
    persistentVolumeClaim:
      claimName: shared-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: warnold-swepro-frontend
  namespace: warnold-dynamo
  labels:
