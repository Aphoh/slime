                - warnold-swepro-trainer-worker
            topologyKey: kubernetes.io/hostname
      tolerations:
      - key: kubernetes.io/arch
        operator: Equal
        value: arm64
        effect: NoSchedule
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      - key: warnold-swepro-reservation
        operator: Equal
        value: smoke-20260526
        effect: NoSchedule
      containers:
      - name: trainer-worker
        image: aphoh/slime:swepro-observability-16ffc8f-20260526-043704
        securityContext:
          capabilities:
            add:
            - IPC_LOCK
        command:
        - bash
        - -c
        args:
        - "set -eu\nPOD_LOG_DIR=\"/data/swebench-pro/pod-logs/$(hostname)\"\nmkdir\
          \ -p \"${POD_LOG_DIR}\"\nexec > >(tee -a \"${POD_LOG_DIR}/trainer-worker.log\"\
          ) 2>&1\nulimit -l unlimited\nulimit -n 1048576\nmkdir -p /data/swebench-pro/runs\n\
          start_ray_log_sync() {\n  (\n    while true; do\n      dest=\"${POD_LOG_DIR}/ray-logs\"\
          \n      mkdir -p \"${dest}\"\n      if [ -d /tmp/ray/session_latest/logs\
          \ ]; then\n        find /tmp/ray/session_latest/logs -maxdepth 1 -type f\
          \ \\\n          \\( -name \"job-driver-*.log\" -o -name \"worker-*.err\"\
          \ -o -name \"worker-*.out\" -o -name \"raylet.*\" -o -name \"dashboard*.log\"\
          \ -o -name \"runtime_env*.log\" -o -name \"ray_process_exit.log\" \\) \\\
          \n          -print0 | while IFS= read -r -d '' file; do\n            cp\
          \ -u \"$file\" \"${dest}/$(basename \"$file\")\" 2>/dev/null || true\n \
          \         done\n      fi\n      sleep \"${SWEPRO_POD_LOG_SYNC_INTERVAL:-30}\"\
          \n    done\n  ) &\n}\nstart_ray_log_sync\nMEM_LOG=\"${POD_LOG_DIR}/memory.log\"\
          \n(\n  while true; do\n    {\n      echo \"===== $(date -Is) =====\"\n \
          \     echo \"--- cgroup memory ---\"\n      for f in /sys/fs/cgroup/memory.current\
          \ /sys/fs/cgroup/memory.max /sys/fs/cgroup/memory.peak /sys/fs/cgroup/memory.events\
          \ /sys/fs/cgroup/memory.stat; do\n        if [ -e \"$f\" ]; then\n     \
          \     echo \"### $f\"\n          cat \"$f\"\n        fi\n      done\n  \
          \    echo \"--- host meminfo ---\"\n      grep -E '^(MemTotal|MemFree|MemAvailable|Buffers|Cached|SwapTotal|SwapFree|Shmem):'\
          \ /proc/meminfo || true\n      echo \"--- top rss processes ---\"\n    \
          \  ps -eo pid,ppid,rss,vsz,comm,args --sort=-rss | head -40 || true\n  \
