      \nENGINE_PROFILE=\"${SWEPRO_ENGINE_PROFILE:-glm47}\"\nif [ \"${ENGINE_PROFILE}\"\
      \ = \"qwen35\" ]; then\n  engine_args=(\n    --page-size \"${SGLANG_QWEN35_PAGE_SIZE:-64}\"\
      \n    --attention-backend \"${SGLANG_QWEN35_ATTENTION_BACKEND:-trtllm_mha}\"\
      \n    --moe-runner-backend \"${SGLANG_QWEN35_MOE_RUNNER_BACKEND:-triton}\"\n\
      \    --mamba-ssm-dtype bfloat16\n    --mamba-scheduler-strategy \"${SGLANG_QWEN35_MAMBA_SCHEDULER_STRATEGY:-extra_buffer}\"\
      \n    --mamba-track-interval \"${SGLANG_QWEN35_MAMBA_TRACK_INTERVAL:-256}\"\n\
      \    --cuda-graph-max-bs \"${SGLANG_CUDA_GRAPH_MAX_BS:-16}\"\n    --max-running-requests\
      \ \"${SGLANG_MAX_RUNNING_REQUESTS:-8}\"\n    --context-length \"${SGLANG_CONTEXT_LENGTH:-65536}\"\
      \n    --max-prefill-tokens \"${SGLANG_MAX_PREFILL_TOKENS:-16384}\"\n    --chunked-prefill-size\
      \ \"${SGLANG_CHUNKED_PREFILL_SIZE:-16384}\"\n    --stream-interval 50\n    --scheduler-recv-interval\
      \ 30\n    --tokenizer-worker-num \"${SGLANG_TOKENIZER_WORKER_NUM:-1}\"\n   \
